<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Icons</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#07080f; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px; font-family:'Courier New',monospace; }

.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; max-width:680px; width:100%; }

.icon-card {
  background:#0d0e1a;
  border:1px solid rgba(255,255,255,0.07);
  border-radius:14px;
  padding:20px;
  display:flex; flex-direction:column; align-items:center; gap:12px;
}

.icon-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.25); }

.icon-row { display:flex; gap:16px; align-items:center; }

.icon-wrap {
  width:36px; height:36px;
  border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  transition:all 0.2s;
  border:1px solid rgba(255,255,255,0.06);
}

.icon-wrap:hover { transform:scale(1.12); }

/* color variants */
.ic-purple { background:rgba(168,85,247,0.15); }
.ic-orange { background:rgba(249,115,22,0.15); }
.ic-cyan   { background:rgba(6,182,212,0.15); }
.ic-gold   { background:rgba(255,200,0,0.15); }
.ic-green  { background:rgba(34,197,94,0.15); }
.ic-blue   { background:rgba(59,130,246,0.15); }
.ic-red    { background:rgba(239,68,68,0.15); }
.ic-teal   { background:rgba(20,184,166,0.15); }
.ic-pink   { background:rgba(236,72,153,0.15); }

svg { display:block; }

.variant-label { font-size:8px; color:rgba(255,255,255,0.15); }
</style>
</head>
<body>

<div class="grid">

  <!-- MESSAGES -->
  <div class="icon-card">
    <div class="icon-label">Messages</div>
    <div class="icon-row">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-purple">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M2 3C2 2.45 2.45 2 3 2H15C15.55 2 16 2.45 16 3V11C16 11.55 15.55 12 15 12H6L3 15V12H3C2.45 12 2 11.55 2 11V3Z" stroke="#a855f7" stroke-width="1.4" fill="rgba(168,85,247,0.1)"/>
            <line x1="5" y1="6" x2="13" y2="6" stroke="#a855f7" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="5" y1="9" x2="10" y2="9" stroke="#a855f7" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="variant-label">A</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-purple">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="8" r="5.5" stroke="#a855f7" stroke-width="1.4" fill="rgba(168,85,247,0.1)"/>
            <path d="M6 14.5C6 14.5 5 16 3.5 16.5" stroke="#a855f7" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="6.5" y1="7" x2="11.5" y2="7" stroke="#a855f7" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="6.5" y1="9.5" x2="9.5" y2="9.5" stroke="#a855f7" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="variant-label">B</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-purple">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="3.5" width="14" height="9" rx="2" stroke="#a855f7" stroke-width="1.4" fill="rgba(168,85,247,0.1)"/>
            <polyline points="2,4 9,9.5 16,4" stroke="#a855f7" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="variant-label">C</div>
      </div>
    </div>
  </div>

  <!-- STREAK -->
  <div class="icon-card">
    <div class="icon-label">Streak</div>
    <div class="icon-row">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-orange">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 2C9 2 11 5 10 8C12 6.5 12.5 4 12.5 4C12.5 4 15 6.5 15 10C15 13.3 12.3 16 9 16C5.7 16 3 13.3 3 10C3 7 5.5 5 5.5 5C5.5 5 6 8 7.5 8.5C6.5 6.5 9 2 9 2Z" stroke="#f97316" stroke-width="1.3" fill="rgba(249,115,22,0.15)" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="variant-label">A</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-orange">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <polyline points="2,13 6,7 9,10 13,4 16,8" stroke="#f97316" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="16" cy="8" r="1.5" fill="#f97316"/>
          </svg>
        </div>
        <div class="variant-label">B</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-orange">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 2L10.5 7H16L11.5 10L13 15L9 12L5 15L6.5 10L2 7H7.5L9 2Z" stroke="#f97316" stroke-width="1.3" fill="rgba(249,115,22,0.12)" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="variant-label">C</div>
      </div>
    </div>
  </div>

  <!-- ACTIVE DAYS -->
  <div class="icon-card">
    <div class="icon-label">Active Days</div>
    <div class="icon-row">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-cyan">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="4" width="14" height="12" rx="2" stroke="#06b6d4" stroke-width="1.4" fill="rgba(6,182,212,0.08)"/>
            <line x1="6" y1="2" x2="6" y2="6" stroke="#06b6d4" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="12" y1="2" x2="12" y2="6" stroke="#06b6d4" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="2" y1="8" x2="16" y2="8" stroke="#06b6d4" stroke-width="1.2"/>
            <circle cx="6.5" cy="11.5" r="1" fill="#06b6d4"/>
            <circle cx="9.5" cy="11.5" r="1" fill="#06b6d4"/>
            <circle cx="12.5" cy="11.5" r="1" fill="rgba(6,182,212,0.35)"/>
          </svg>
        </div>
        <div class="variant-label">A</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-cyan">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="4" width="14" height="12" rx="2" stroke="#06b6d4" stroke-width="1.4" fill="rgba(6,182,212,0.08)"/>
            <line x1="6" y1="2" x2="6" y2="6" stroke="#06b6d4" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="12" y1="2" x2="12" y2="6" stroke="#06b6d4" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="2" y1="8" x2="16" y2="8" stroke="#06b6d4" stroke-width="1.2"/>
            <polyline points="5,12.5 7.5,14.5 13,10" stroke="#06b6d4" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="variant-label">B</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-cyan">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2.5" y="4.5" width="5" height="5" rx="1" fill="rgba(6,182,212,0.3)" stroke="#06b6d4" stroke-width="1.2"/>
            <rect x="10.5" y="4.5" width="5" height="5" rx="1" fill="rgba(6,182,212,0.3)" stroke="#06b6d4" stroke-width="1.2"/>
            <rect x="2.5" y="12" width="5" height="3" rx="1" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1.2"/>
            <rect x="10.5" y="12" width="5" height="3" rx="1" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1.2"/>
          </svg>
        </div>
        <div class="variant-label">C</div>
      </div>
    </div>
  </div>

  <!-- ER% -->
  <div class="icon-card">
    <div class="icon-label">ER %</div>
    <div class="icon-row">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-green">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <polyline points="2,13 5,9 8,11 12,5 16,3" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="2,13 16,13" stroke="#22c55e" stroke-width="1.1" stroke-linecap="round" opacity="0.4"/>
            <circle cx="16" cy="3" r="1.8" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="1.2"/>
          </svg>
        </div>
        <div class="variant-label">A</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-green">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="10" width="3" height="6" rx="1" fill="rgba(34,197,94,0.3)" stroke="#22c55e" stroke-width="1.2"/>
            <rect x="7.5" y="7" width="3" height="9" rx="1" fill="rgba(34,197,94,0.5)" stroke="#22c55e" stroke-width="1.2"/>
            <rect x="13" y="4" width="3" height="12" rx="1" fill="rgba(34,197,94,0.7)" stroke="#22c55e" stroke-width="1.2"/>
          </svg>
        </div>
        <div class="variant-label">B</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-green">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="6.5" stroke="#22c55e" stroke-width="1.4" fill="rgba(34,197,94,0.08)"/>
            <path d="M9 9 L9 3" stroke="#22c55e" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M9 9 L13.5 11.5" stroke="#22c55e" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
            <circle cx="9" cy="9" r="1.5" fill="#22c55e"/>
          </svg>
        </div>
        <div class="variant-label">C</div>
      </div>
    </div>
  </div>

  <!-- VIEWS -->
  <div class="icon-card">
    <div class="icon-label">Views</div>
    <div class="icon-row">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-blue">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M1.5 9C1.5 9 4.5 3.5 9 3.5C13.5 3.5 16.5 9 16.5 9C16.5 9 13.5 14.5 9 14.5C4.5 14.5 1.5 9 1.5 9Z" stroke="#3b82f6" stroke-width="1.4" fill="rgba(59,130,246,0.08)"/>
            <circle cx="9" cy="9" r="2.5" stroke="#3b82f6" stroke-width="1.4" fill="rgba(59,130,246,0.15)"/>
            <circle cx="9" cy="9" r="1" fill="#3b82f6"/>
          </svg>
        </div>
        <div class="variant-label">A</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-blue">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 3C5 3 2 9 2 9C2 9 5 15 9 15C13 15 16 9 16 9C16 9 13 3 9 3Z" stroke="#3b82f6" stroke-width="1.3" fill="rgba(59,130,246,0.08)"/>
            <circle cx="9" cy="9" r="3" stroke="#3b82f6" stroke-width="1.3" fill="rgba(59,130,246,0.12)"/>
            <line x1="9" y1="5.5" x2="9" y2="7" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
            <line x1="12.5" y1="9" x2="11" y2="9" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
          </svg>
        </div>
        <div class="variant-label">B</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-blue">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="7" r="3.5" stroke="#3b82f6" stroke-width="1.4" fill="rgba(59,130,246,0.1)"/>
            <path d="M3 15C3 12.2 5.7 10 9 10C12.3 10 15 12.2 15 15" stroke="#3b82f6" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.6"/>
            <circle cx="9" cy="7" r="1.2" fill="#3b82f6"/>
          </svg>
        </div>
        <div class="variant-label">C</div>
      </div>
    </div>
  </div>

  <!-- POSTS -->
  <div class="icon-card">
    <div class="icon-label">Posts</div>
    <div class="icon-row">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-teal">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="3" y="2" width="12" height="14" rx="2" stroke="#14b8a6" stroke-width="1.4" fill="rgba(20,184,166,0.08)"/>
            <line x1="6" y1="6" x2="12" y2="6" stroke="#14b8a6" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="6" y1="9" x2="12" y2="9" stroke="#14b8a6" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="6" y1="12" x2="9" y2="12" stroke="#14b8a6" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="variant-label">A</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-teal">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M13 2L15 4L7 12L4 13L5 10L13 2Z" stroke="#14b8a6" stroke-width="1.3" fill="rgba(20,184,166,0.1)" stroke-linejoin="round"/>
            <line x1="11" y1="4" x2="14" y2="7" stroke="#14b8a6" stroke-width="1.2"/>
          </svg>
        </div>
        <div class="variant-label">B</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="icon-wrap ic-teal">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M3 14L9 3L15 14H3Z" stroke="#14b8a6" stroke-width="1.3" fill="rgba(20,184,166,0.1)" stroke-linejoin="round"/>
            <line x1="9" y1="8" x2="9" y2="11" stroke="#14b8a6" stroke-width="1.3" stroke-linecap="round"/>
            <circle cx="9" cy="12.5" r="0.8" fill="#14b8a6"/>
          </svg>
        </div>
        <div class="variant-label">C</div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
